name: Test Package Installation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test (auth=${{ matrix.auth }}, module=${{ matrix.module }})

    strategy:
      fail-fast: false
      matrix:
        include:
          - auth: none
            module: none
          - auth: none
            module: users
          - auth: breeze
            module: none
          - auth: breeze
            module: users
          - auth: sanctum
            module: none
          - auth: sanctum
            module: users

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: curl, mbstring, zip, pdo, sqlite, pdo_sqlite
        coverage: none

    - name: Install Package Dependencies
      run: composer install --no-interaction

    - name: Run Package Tests
      run: ./vendor/bin/phpunit

    - name: Create Laravel Project
      run: composer create-project laravel/laravel test-project --prefer-dist

    - name: Install DDD Package
      working-directory: test-project
      run: |
        composer config repositories.ddd vcs ${{ github.server_url }}/${{ github.repository }}
        composer require laravel-ddd/starter:dev-main

    - name: Run DDD Installation
      working-directory: test-project
      run: php artisan ddd:install --auth=${{ matrix.auth }} --module=${{ matrix.module }}

    - name: Verify Structure
      working-directory: test-project
      run: |
        test -d app/Domains/Base && echo "✅ Domains/Base exists"
        test -f app/Domains/Base/Entity.php && echo "✅ Entity.php exists"
        test -f app/Domains/Base/ValueObject.php && echo "✅ ValueObject.php exists"
        
        if [ "${{ matrix.module }}" = "users" ]; then
          test -d app/Domains/Users && echo "✅ Domains/Users exists"
          test -f app/Domains/Users/Entities/User.php && echo "✅ User entity exists"
          test -f app/Models/User.php && echo "✅ User model exists"
        fi
        
        if [ "${{ matrix.auth }}" = "breeze" ]; then
          test -f routes/auth.php && echo "✅ Breeze routes exist"
        fi
        
        if [ "${{ matrix.auth }}" = "sanctum" ]; then
          grep -q "laravel/sanctum" composer.lock && echo "✅ Sanctum installed"
        fi
